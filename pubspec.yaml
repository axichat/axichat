name: axichat
description: "Free and open-source chat + email client."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

# TODO: Bump the version + build number together before every store submission.
version: 0.6.1+1

# TODO: Update homepage/repository URLs if the canonical Git remote changes.
homepage: https://gitlab.com/axichat/axichat
repository: https://gitlab.com/axichat/axichat.git
issue_tracker: https://gitlab.com/axichat/axichat/-/issues

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  characters: ^1.3.0
  drift: ^2.19.2
  equatable: ^2.0.5
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  provider: ^6.1.5
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  hydrated_bloc: ^10.1.1
  json_annotation: ^4.9.0
  logging: ^1.2.0
  mime: ^2.0.0
  path: ^1.9.0
  path_provider: ^2.1.3
  archive: ^4.0.7
  permission_handler: ^12.0.0+1
  retry: ^3.1.2
  sqlcipher_flutter_libs: ^0.6.3
  moxxmpp:
    git:
      url: https://gitlab.com/axichat/moxxmpp.git
      path: packages/moxxmpp
      ref: v0.6.4
  moxxmpp_socket_tcp:
    git:
      url: https://gitlab.com/axichat/moxxmpp.git
      path: packages/moxxmpp_socket_tcp
      ref: v0.6.4
  moxlib:
    git:
      url: https://gitlab.com/axichat/moxlib.git
      ref: v0.2.0
  crypto: ^3.0.3
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  uuid: ^3.0.7
  freezed_annotation: ^3.0.0
  dash_chat_2: ^0.0.21
  async: ^2.11.0
  shadcn_ui: ^0.45.1
  stream_transform: ^2.1.0
  emoji_picker_flutter: ^4.4.0
  animations: ^2.0.11
  libsignal_protocol_dart: ^0.7.2
  package_info_plus: ^9.0.0
  http: ^1.2.2
  xml: ^6.5.0
  hsluv: ^1.1.3
  flutter_foreground_task: ^9.1.0
  html: ^0.15.6
  shorebird_code_push: ^2.0.3
  url_launcher: ^6.3.0
  video_player: ^2.10.0
  connectivity_plus: ^7.0.0
  dbus: ^0.7.11
  flutter_html: ^3.0.0
  desktop_webview_window: 0.2.3
  flutter_inappwebview: ^6.1.5
  flutter_local_notifications: ^20.0.0
  flutter_timezone: ^3.0.1
  timezone: ^0.10.0
  dnsolve: ^2.0.0
  in_app_update: ^4.2.5
  app_settings: ^7.0.0
  intl: ^0.20.2 # Required by flutter_localizations; override keeps dash_chat_2 compatible.
  chrono_dart: ^2.0.2
  omemo_dart:
    git:
      url: https://gitlab.com/axichat/omemo_dart.git
      ref: v0.7.1
  sqlite3: ^2.9.4
  delta_ffi:
    path: packages/delta_ffi # Rust FFI bindings built from source via code_assets hooks.
  share_plus: ^12.0.1
  share_handler: ^0.0.25
  image: ^4.7.2
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.7.0
  cryptography: ^2.9.0
  flex_color_picker: ^3.8.0
  crop_your_image: ^2.0.0
  carousel_slider: ^5.1.1
  custom_refresh_indicator: ^4.0.1
  pdfrx: ^2.2.24
  charset_converter: ^2.3.0
  google_nav_bar: ^5.0.7
  upgrader: ^12.5.0

dependency_overrides:
  pinenacl: ^0.6.0
  intl: ^0.20.2
  moxlib:
    git:
      url: https://gitlab.com/axichat/moxlib.git
      ref: v0.2.0

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  json_serializable: ^6.8.0
  build_runner: ^2.4.13
  go_router_builder: ^4.2.0
  build_verify: ^3.1.0
  drift_dev: ^2.19.1
  lint: ^2.3.0
  freezed: ^3.0.0
  msix: ^3.16.8
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  change_app_package_name: ^1.5.0
  flutter_native_splash: ^2.4.6
  integration_test:
    sdk: flutter
  fake_async: ^1.3.1
  hive_ce_generator: ^1.4.0
  path_provider_platform_interface: ^2.1.2



flutter:
  #  default-flavor: production
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/images/avatars/abstract/
    - assets/images/avatars/stem/
    - assets/images/avatars/sport/
    - assets/images/avatars/music/
    - assets/images/avatars/misc/
    - assets/icons/
    - assets/licenses/delta_chat_core_mpl.txt
    - assets/licenses/noto_color_emoji_ofl.txt
    - assets/licenses/inter_ofl.txt
    - assets/licenses/dmsans_ofl.txt
    - assets/licenses/gabarito_ofl.txt
    - assets/licenses/document.txt
    - assets/licenses/document2.txt
    - shorebird.yaml
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
          weight: 400
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
          weight: 500
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
          weight: 600
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
          weight: 700
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
          weight: 800
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
          weight: 900
        - asset: assets/fonts/Inter-Italic-VariableFont_slnt,wght.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter-Italic-VariableFont_slnt,wght.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter-Italic-VariableFont_slnt,wght.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Inter-Italic-VariableFont_slnt,wght.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Inter-Italic-VariableFont_slnt,wght.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Inter-Italic-VariableFont_slnt,wght.ttf
          weight: 900
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 400
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 500
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 600
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 700
        - asset: assets/fonts/DMSans-Italic-VariableFont_opsz,wght.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/DMSans-Italic-VariableFont_opsz,wght.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/DMSans-Italic-VariableFont_opsz,wght.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/DMSans-Italic-VariableFont_opsz,wght.ttf
          weight: 700
          style: italic

    - family: Gabarito
      fonts:
        - asset: assets/fonts/Gabarito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Gabarito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Gabarito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Gabarito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Gabarito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Gabarito-Black.ttf
          weight: 900
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path_ios: assets/icons/generated/app_icon_ios.png
  image_path_macos: assets/icons/generated/app_icon_macos.png
  image_path_android: assets/icons/generated/app_icon_android_legacy.png
  adaptive_icon_foreground: assets/icons/generated/app_icon_android_foreground.png
  adaptive_icon_background: assets/icons/generated/app_icon_android_background.png
  adaptive_icon_monochrome: assets/icons/generated/app_icon_android_monochrome.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icons/generated/app_icon_web.png
    background_color: "#1BA5FF"
    theme_color: "#1BA5FF"
  windows:
    generate: true
    image_path: assets/icons/generated/app_icon_windows.png
  macos:
    generate: true
    image_path: assets/icons/generated/app_icon_macos.png
  linux:
    generate: true
    image_path: assets/icons/generated/app_icon_linux.png

flutter_native_splash:
  color: "#000000"
  image: assets/images/axichat_banner.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#000000"
    image: assets/images/axichat_banner.png
