[package]
name = "deltachat_wrap"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
deltachat = { git = "https://gitlab.com/axichat/deltachat-core-rust.git", rev = "52beedd77f6de9f1597bf7c2be6cc6bd0c052937", package = "deltachat_ffi", default-features = false, features = ["vendored"] }
deltachat_core = { git = "https://gitlab.com/axichat/deltachat-core-rust.git", rev = "52beedd77f6de9f1597bf7c2be6cc6bd0c052937", package = "deltachat", default-features = false, features = ["internals", "vendored"] }
brotli = { version = "8", default-features = false, features = ["std"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
