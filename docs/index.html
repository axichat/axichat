<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axichat Pages Assets</title>
    <style>
      body {
        margin: 0;
        padding: 2rem;
        font-family: sans-serif;
        line-height: 1.5;
      }

      main {
        margin: 0 auto;
        max-width: 48rem;
      }

      img {
        display: block;
        max-width: 100%;
      }

      .asset-preview {
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Axichat Pages Assets</h1>
      <p>This site hosts static assets used by the Axichat GitHub README.</p>
      <p><a href="https://github.com/axichat/axichat">View the repository on GitHub</a></p>
      <section class="asset-preview" aria-labelledby="banner-heading">
        <h2 id="banner-heading">Banner</h2>
        <p>
          <a href="./readme-media/axichat_banner.png">Open axichat_banner.png</a>
        </p>
        <img src="./readme-media/axichat_banner.png" alt="Axichat banner" />
      </section>
    </main>
  </body>
</html>
