definitions:
  scripts:
    - &shorebird_install
      name: Install Shorebird
      script: |
        # Install Shorebird
        curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash

        # Add Shorebird to PATH
        echo PATH="$HOME/.shorebird/bin:$PATH" >> $CM_ENV
    - &shorebird_install_windows
      name: Install Shorebird Windows
      script: |
        Set-ExecutionPolicy RemoteSigned -scope CurrentUser
        iwr -UseBasicParsing 'https://raw.githubusercontent.com/shorebirdtech/install/main/install.ps1'|iex
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Add-Content -Path $env:CM_ENV -Value "PATH=$env:Path"
    - &rust_install_windows
      name: Install Rust Windows
      script: |
        $rustupInstaller = Join-Path $env:TEMP 'rustup-init.exe'
        iwr -UseBasicParsing 'https://win.rustup.rs/x86_64' -OutFile $rustupInstaller
        & $rustupInstaller -y --default-toolchain stable-x86_64-pc-windows-msvc
        $cargoBin = Join-Path $env:USERPROFILE '.cargo\bin'
        $env:Path = "$cargoBin;$env:Path"
        rustup target add x86_64-pc-windows-msvc
        Add-Content -Path $env:CM_ENV -Value "PATH=$env:Path"
    - &openssl_install_windows
      name: Install OpenSSL Windows
      script: |
        choco install openssl --version 3.1.1 -y
    - &inno_setup_install_windows
      name: Install Inno Setup Windows
      script: |
        choco install innosetup -y
    - &refresh_path_windows
      name: Refresh Path
      script: |
        Import-Module $env:ChocolateyInstall\helpers\chocolateyProfile.psm1
        refreshenv
    - &fetch_dependencies
      name: Fetch Dependencies
      script: |
        flutter clean
        flutter pub get
        flutter doctor
        flutter devices
        flutter emulators
    - &build_runner
      name: Build Runner
      script: |
        flutter pub get
        dart run build_runner build --delete-conflicting-outputs
    - &diagnose_git_remotes
      name: Diagnose Git Remotes
      script: |
        git remote -v
    - &github_release_create_android
      name: Create Android GitHub Release
      script: |
        git remote set-url origin https://github.com/axichat/axichat.git
        git remote -v
        
        echo $GITHUB_TOKEN | gh auth login --with-token
        
        sh -c '
          [ -n "$CM_TAG" ] || { echo "CM_TAG is empty"; exit 1; }

          # optional: set this if you want to be explicit about repo
          # REPO="owner/name"

          if gh release view "$CM_TAG" >/dev/null 2>&1; then
            echo "Release exists, skipping."
          else
            gh release create "$CM_TAG" --verify-tag --notes-from-tag --title "axichat $CM_TAG"
          fi
        '
    - &github_release_upload_android
      name: Upload to Android GitHub Releases
      script: |
        git remote set-url origin https://github.com/axichat/axichat.git
        git remote -v
        
        echo $GITHUB_TOKEN | gh auth login --with-token
        
        gh release upload $CM_TAG \
        dist/*.apk \
        dist/*.apk.sha256
    - &github_release_create_windows
      name: Create Windows GitHub Release
      script: |
        git remote set-url origin https://github.com/axichat/axichat.git
        git remote -v
        
        echo $env:GITHUB_TOKEN | gh auth login --with-token
        
        $ErrorActionPreference = 'Stop'
        if ([string]::IsNullOrWhiteSpace($env:CM_TAG)) { throw "CM_TAG is empty (not a tag build?)" }
  
        $json = gh release view $env:CM_TAG --json tagName 2>$null
        $ghOk = ($LASTEXITCODE -eq 0)
  
        if ($ghOk -and ($json | ConvertFrom-Json).tagName -eq $env:CM_TAG) {
          Write-Host "Release exists, skipping."
        } else {
          gh release create $env:CM_TAG --verify-tag --notes-from-tag --title "axichat $($env:CM_TAG)"
        }
    - &github_release_upload_windows
      name: Upload to Windows GitHub Releases
      script: |
        git remote set-url origin https://github.com/axichat/axichat.git
        git remote -v
        
        echo $env:GITHUB_TOKEN | gh auth login --with-token
        
        gh release upload $env:CM_TAG `
          dist\axichat-windows.zip `
          dist\axichat-windows.zip.sha256 `
          dist\axichat-windows-setup.exe `
          dist\axichat-windows-setup.exe.sha256
    - &github_release_upload_linux
      name: Upload to Linux GitHub Releases
      script: |
        git remote set-url origin https://github.com/axichat/axichat.git
        git remote -v

        echo $GITHUB_TOKEN | gh auth login --with-token

        gh release upload $CM_TAG \
          dist/axichat-linux.tar.gz \
          dist/axichat-linux.tar.gz.sha256 \
          dist/axichat-linux-amd64.deb \
          dist/axichat-linux-amd64.deb.sha256 \
          dist/axichat-x86_64.AppImage \
          dist/axichat-x86_64.AppImage.sha256

workflows:
  test-workflow:
    name: Test Only Workflow
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: 'dev'
          include: true
          source: true
    when:
      changeset:
        includes:
          - '.'
        excludes:
          - '**/*.md'
          - 'metadata/*'
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      ubuntu: 24.04
      flutter: 3.41.4
      groups:
        - integration_test
        - email_provisioning # Provides EMAIL_PUBLIC_TOKEN for dart-define builds/tests.
      android_signing:
        - AXICHAT_UPLOAD_KEY
    scripts:
      - *fetch_dependencies
      - *build_runner
      - name: Unit Tests
        script: |
          mkdir -p test-results
          flutter test \
          --dart-define=EMAIL_PUBLIC_TOKEN=$EMAIL_PUBLIC_TOKEN \
          --machine > test-results/flutter.json
        test_report: test-results/flutter.json
      - name: Integration Tests
        script: |
          mkdir -p test-results
          flutter emulators --launch emulator-35 
          adb wait-for-device
          flutter test -d emulator-5554 integration_test \
          --dart-define=EMAIL_PUBLIC_TOKEN=$EMAIL_PUBLIC_TOKEN \
          --dart-define=USERNAME=$USERNAME \
          --dart-define=PASSWORD=$PASSWORD \
          --dart-define=CONTACT_JID=$CONTACT_JID \
          --machine > test-results/flutter.json
        test_report: test-results/flutter.json
  release-android-workflow:
    name: Android Release Workflow
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: 'master'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v+([0-9]).+([0-9]).+([0-9])'
          include: true
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      ubuntu: 24.04
      flutter: 3.41.4
      groups:
        - shorebird # Requires SHOREBIRD_TOKEN from `shorebird login:ci`.
        - github # Provide a GitHub PAT as GITHUB_TOKEN for release publishing.
        - email_provisioning # EMAIL_PUBLIC_TOKEN for provisioning glue service.
      android_signing:
        - AXICHAT_UPLOAD_KEY # Upload the release keystore/certs and link it as AXICHAT_UPLOAD_KEY.
    scripts:
      - *shorebird_install
      - *fetch_dependencies
      - *build_runner
      - name: Shorebird Release
        script: |
          shorebird release android --flavor production --artifact=apk --flutter-version=3.41.4 -- \
          --dart-define=EMAIL_PUBLIC_TOKEN=$EMAIL_PUBLIC_TOKEN
      - name: Export Android Release Assets
        script: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/*.apk dist/
          ./tool/write_sha256_files.sh dist/*.apk
      - *github_release_create_android
      - *github_release_upload_android
    artifacts:
      - dist/*.apk
      - dist/*.apk.sha256
  patch-android-workflow:
    name: Android Patch Workflow
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      ubuntu: 24.04
      flutter: 3.41.4
      groups:
        - shorebird # Codemagic must expose SHOREBIRD_TOKEN for patching builds.
        - email_provisioning # EMAIL_PUBLIC_TOKEN for provisioning glue service.
    inputs:
      release_version:
        description: The release version to patch
    scripts:
      - *shorebird_install
      - *fetch_dependencies
      - *build_runner
      - name: Shorebird Patch
        script: |
          shorebird patch android --flavor production \
          --release-version=${{ inputs.release_version }} \
          -- \
          --dart-define=EMAIL_PUBLIC_TOKEN=$EMAIL_PUBLIC_TOKEN
  dev-release-android-workflow:
    name: Android Development Release Workflow
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: 'dev'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v+([0-9]).+([0-9]).+([0-9])-dev'
          include: true
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      ubuntu: 24.04
      flutter: 3.41.4
      groups:
        - shorebird # Requires SHOREBIRD_TOKEN from `shorebird login:ci`.
        - github # Provide GITHUB_TOKEN via Codemagic's github group before tagging dev releases.
        - email_provisioning # EMAIL_PUBLIC_TOKEN for provisioning glue service.
      android_signing:
        - AXICHAT_UPLOAD_KEY # Upload a dev keystore or reuse the production key via Codemagic secrets.
    scripts:
      - *shorebird_install
      - *fetch_dependencies
      - *build_runner
      - name: Shorebird Release Development
        script: |
          shorebird release android --flavor development --artifact=apk --flutter-version=3.41.4 -- \
          --dart-define=EMAIL_PUBLIC_TOKEN=$EMAIL_PUBLIC_TOKEN
      - name: Export Android Development Release Assets
        script: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/*.apk dist/
          ./tool/write_sha256_files.sh dist/*.apk
      - *github_release_create_android
      - *github_release_upload_android
    artifacts:
      - dist/*.apk
      - dist/*.apk.sha256
  dev-patch-android-workflow:
    name: Android Development Patch Workflow
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      ubuntu: 24.04
      flutter: 3.41.4
      groups:
        - shorebird # Codemagic group must include SHOREBIRD_TOKEN for dev patching.
        - email_provisioning # EMAIL_PUBLIC_TOKEN for provisioning glue service.
    inputs:
      release_version:
        description: The release version to patch
    scripts:
      - *shorebird_install
      - *fetch_dependencies
      - *build_runner
      - name: Shorebird Patch Development
        script: |
          shorebird patch android --flavor development \
          --release-version=${{ inputs.release_version }} \
          -- \
          --dart-define=EMAIL_PUBLIC_TOKEN=$EMAIL_PUBLIC_TOKEN
  release-windows-workflow:
    name: Windows Release Workflow
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: 'master'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v+([0-9]).+([0-9]).+([0-9])'
          include: true
    max_build_duration: 60
    instance_type: windows_x2
    environment:
      flutter: 3.41.4
      groups:
        - shorebird # Requires SHOREBIRD_TOKEN from `shorebird login:ci` for Windows releases.
        - github # Provide a GitHub PAT via GITHUB_TOKEN for desktop uploads.
        - email_provisioning # EMAIL_PUBLIC_TOKEN for provisioning glue service.
    scripts:
      - *shorebird_install_windows
      - *rust_install_windows
      - *fetch_dependencies
      - *build_runner
      - *openssl_install_windows
      - *inno_setup_install_windows
      - *refresh_path_windows
      - name: Configure for Windows
        script: |
          flutter config --enable-windows-desktop
      - name: Shorebird Release
        script: |
          & $HOME\.shorebird\bin\shorebird.ps1 release windows --flutter-version=3.41.4 -- `
            --dart-define=EMAIL_PUBLIC_TOKEN=$env:EMAIL_PUBLIC_TOKEN
      - name: Export bundle
        script: |
          mkdir dist
          Copy-Item -Path C:\Windows\System32\msvcp140.dll -Destination build/windows/x64/runner/Release 
          Copy-Item -Path C:\Windows\System32\vcruntime140.dll -Destination build/windows/x64/runner/Release 
          Copy-Item -Path C:\Windows\System32\vcruntime140_1.dll -Destination build/windows/x64/runner/Release 
          7z a -r dist\axichat-windows.zip build\windows\x64\runner\Release\*
      - name: Build Windows Installer
        script: |
          $version = $env:CM_TAG.TrimStart('v')
          iscc /DAppVersion=$version /DAppSourceDir=build\windows\x64\runner\Release /DAppOutputDir=dist packaging\windows\axichat.iss
      - name: Generate Windows Checksums
        script: |
          & .\tool\write_sha256_files.ps1 dist\axichat-windows.zip dist\axichat-windows-setup.exe
      - *github_release_create_windows
      - *github_release_upload_windows
    artifacts:
      - dist\axichat-windows.zip
      - dist\axichat-windows.zip.sha256
      - dist\axichat-windows-setup.exe
      - dist\axichat-windows-setup.exe.sha256
  release-linux-workflow:
    name: Linux Release Workflow
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: 'master'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v+([0-9]).+([0-9]).+([0-9])'
          include: true
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      ubuntu: 24.04
      flutter: 3.41.4
      groups:
        - shorebird # Requires SHOREBIRD_TOKEN for Linux desktop releases.
        - github # Provide GITHUB_TOKEN with repo scope for Linux artifact uploads.
        - email_provisioning # EMAIL_PUBLIC_TOKEN for provisioning glue service.
    scripts:
      - *shorebird_install
      - *fetch_dependencies
      - *build_runner
      - name: Install linuxdeploy
        script: |
          mkdir -p "$HOME/.local/bin"
          curl -L \
            -o "$HOME/.local/bin/linuxdeploy-x86_64.AppImage" \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x "$HOME/.local/bin/linuxdeploy-x86_64.AppImage"
          ln -sf "$HOME/.local/bin/linuxdeploy-x86_64.AppImage" "$HOME/.local/bin/linuxdeploy"
          echo 'PATH="$HOME/.local/bin:$PATH"' >> "$CM_ENV"
      - name: Configure for Linux
        script: |
          flutter config --enable-linux-desktop
      - name: Shorebird Release Linux
        script: |
          shorebird release linux --flutter-version=3.41.4 -- \
          --dart-define=EMAIL_PUBLIC_TOKEN=$EMAIL_PUBLIC_TOKEN
      - name: Package Linux Bundle
        script: |
          mkdir -p dist
          tar -czf dist/axichat-linux.tar.gz -C build/linux/x64/release/bundle .
      - name: Package Debian Bundle
        script: |
          ./tool/package_deb.sh build/linux/x64/release/bundle "$CM_TAG" dist
      - name: Package AppImage
        script: |
          ./tool/package_appimage.sh build/linux/x64/release/bundle "$CM_TAG" dist
      - name: Generate Linux Checksums
        script: |
          ./tool/write_sha256_files.sh dist/axichat-linux.tar.gz dist/axichat-linux-amd64.deb dist/axichat-x86_64.AppImage
      - *github_release_create_android
      - *github_release_upload_linux
    artifacts:
      - dist/axichat-linux.tar.gz
      - dist/axichat-linux.tar.gz.sha256
      - dist/axichat-linux-amd64.deb
      - dist/axichat-linux-amd64.deb.sha256
      - dist/axichat-x86_64.AppImage
      - dist/axichat-x86_64.AppImage.sha256
