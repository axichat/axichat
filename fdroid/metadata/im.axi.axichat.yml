Builds:
  - versionName: 0.7.1
    versionCode: 2003
    commit: 22e581cd31ffac7af219d36092c19187d76110bd
    sudo:
      - apt-get update
      - apt-get install -y gcc make libc-dev pkg-config perl rustup
    output: build/app/outputs/flutter-apk/app-arm64-v8a-production-release.apk
    srclibs:
      - flutter@3.41.4
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - rustup default 1.90.0
      - rustup target add aarch64-linux-android
      - $$flutter$$/bin/flutter pub get
      # Generate a temporary patch script that strips Play Core from in_app_update for F-Droid.
      - python3 -c 'import base64; from pathlib import Path;
        Path(".fdroid_patch_in_app_update.py").write_bytes(base64.b64decode("
        "))'
      - python3 .fdroid_patch_in_app_update.py "$PUB_CACHE"
      - rm -f .fdroid_patch_in_app_update.py
      - python3 -c 'import json; from pathlib import Path; p=Path(".flutter-plugins-dependencies");
        o=json.loads(p.read_text()); d={q["name"] for ps in o.get("plugins", {}).values()
        if isinstance(ps, list) for q in ps if q.get("dev_dependency")}; o["plugins"]={k:[q
        for q in ps if q.get("name") not in d] for k, ps in o.get("plugins", {}).items()};
        o["dependencyGraph"]=[q for q in o.get("dependencyGraph", []) if q.get("name")
        not in d]; p.write_text(json.dumps(o, separators=(",", ":")))'
      - find "$PUB_CACHE/hosted/pub.dev" -mindepth 2 -maxdepth 2 \( -name example
        -o -name test -o -name tests -o -name benchmark -o -name benchmarks -o -name
        windows -o -name linux -o -name macos -o -name ios -o -name web -o -name extension
        \) -prune -exec rm -rf {} +
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
      - rm -rf .dart_tool/build android/.gradle .gradle-user-home
      - $$flutter$$/bin/flutter build apk --flavor production --release --split-per-abi
        --target-platform=android-arm64 --build-number=$(($$VERCODE$$ % 1000)) --dart-define=EMAIL_PUBLIC_TOKEN=axichatpublictoken
        --dart-define=ENABLE_SHOREBIRD=false
    ndk: 28.2.13676358

AllowedAPKSigningKeys: 92d96304e82efa324f6aab21d731b32f05dbb3c8d42fc5514ea6755f33498d2e

AutoUpdateMode: Version
UpdateCheckMode: Tags
VercodeOperation:
  - 2000 + %c
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
