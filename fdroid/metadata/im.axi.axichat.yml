Builds:
  - versionName: 0.7.1
    versionCode: 2003
    commit: v0.7.1
    sudo:
      - apt-get update
      - apt-get install -y build-essential pkg-config perl
    output: build/app/outputs/flutter-apk/app-arm64-v8a-production-release.apk
    srclibs:
      - flutter@3.41.4
      - rustup@1.27.1
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export ANDROID_HOME=$$SDK$$
      - export ANDROID_SDK_ROOT=$$SDK$$
      - export ANDROID_NDK_HOME=$$NDK$$
      - export ANDROID_NDK_ROOT=$$NDK$$
      - printf "sdk.dir=%s\nflutter.sdk=%s\n" "$$SDK$$" "$$flutter$$" > android/local.properties
      - $$flutter$$/bin/flutter config --no-analytics
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export GRADLE_USER_HOME=$(pwd)/.gradle-user-home
      - export GRADLE_OPTS="-Dorg.gradle.caching=false -Dorg.gradle.workers.max=1
        -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.vfs.watch=false
        -Dorg.gradle.configuration-cache=false -Dkotlin.incremental=false"
      - export ANDROID_HOME=$$SDK$$
      - export ANDROID_SDK_ROOT=$$SDK$$
      - export ANDROID_NDK_HOME=$$NDK$$
      - export ANDROID_NDK_ROOT=$$NDK$$
      - $$rustup$$/rustup-init.sh -y --default-toolchain 1.90.0
      - source $HOME/.cargo/env
      - rustup target add aarch64-linux-android
      - $$flutter$$/bin/flutter pub get
      - |
        python3 - <<'PY'
        import json
        from pathlib import Path

        plugin_graph_path = Path(".flutter-plugins-dependencies")
        plugin_graph = json.loads(plugin_graph_path.read_text())
        dev_only_plugins = {
            plugin["name"]
            for plugins in plugin_graph.get("plugins", {}).values()
            if isinstance(plugins, list)
            for plugin in plugins
            if plugin.get("dev_dependency")
        }
        plugin_graph["plugins"] = {
            platform: [
                plugin
                for plugin in plugins
                if plugin.get("name") not in dev_only_plugins
            ]
            for platform, plugins in plugin_graph.get("plugins", {}).items()
        }
        plugin_graph["dependencyGraph"] = [
            plugin
            for plugin in plugin_graph.get("dependencyGraph", [])
            if plugin.get("name") not in dev_only_plugins
        ]
        plugin_graph_path.write_text(json.dumps(plugin_graph, separators=(",", ":")))
        PY
      - find "$PUB_CACHE/hosted/pub.dev" -mindepth 2 -maxdepth 2 \( -name example
        -o -name test -o -name tests -o -name benchmark -o -name benchmarks -o -name
        windows -o -name linux -o -name macos -o -name ios -o -name web -o -name extension
        \) -prune -exec rm -rf {} +
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
      - rm -rf .dart_tool/build android/.gradle .gradle-user-home
      - $$flutter$$/bin/flutter build apk --flavor production --release --split-per-abi
        --target-platform=android-arm64 --build-number=$(($$VERCODE$$ % 1000)) --dart-define=EMAIL_PUBLIC_TOKEN=axichatpublictoken
        --dart-define=ENABLE_SHOREBIRD=false
    ndk: 28.2.13676358

