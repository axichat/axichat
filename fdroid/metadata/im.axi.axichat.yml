# F-Droid metadata template for Axichat.
# Copy this file into fdroiddata/metadata/im.axi.axichat.yml when submitting to F-Droid.
# Keep fields in sync with pubspec.yaml before submission.

Categories:
  - Email
  - Messaging
  - Calendar & Agenda
  - Internet

License: AGPL-3.0-or-later
AuthorName: Axichat Developers
WebSite: https://axi.chat
SourceCode: https://gitlab.com/axichat/axichat
IssueTracker: https://gitlab.com/axichat/axichat/-/issues
Changelog: https://gitlab.com/axichat/axichat/-/releases
Donate: https://axi.chat/donate

RepoType: git
Repo: https://gitlab.com/axichat/axichat.git

Builds:
  - versionName: 0.6.1
    versionCode: 1001 # 1000 + pubspec build code (armv7)
    commit: v0.6.1 # Replace with the exact release tag/commit submitted to F-Droid.
    subdir: .
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-production-release.apk
    srclibs:
      - flutter@3.41.4
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - echo "flutter.sdk=$$flutter$$" > android/local.properties
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
      - $$flutter$$/bin/flutter build apk \
        --flavor production \
        --release \
        --split-per-abi \
        --target-platform=android-arm \
        --build-number=$$VERCODE$$ \
        --dart-define=EMAIL_PUBLIC_TOKEN=axichatpublictoken \
        --dart-define=ENABLE_SHOREBIRD=false
  - versionName: 0.6.1
    versionCode: 2001 # 2000 + pubspec build code (arm64)
    commit: v0.6.1 # Replace with the exact release tag/commit submitted to F-Droid.
    subdir: .
    output: build/app/outputs/flutter-apk/app-arm64-v8a-production-release.apk
    srclibs:
      - flutter@3.41.4
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - echo "flutter.sdk=$$flutter$$" > android/local.properties
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
      - $$flutter$$/bin/flutter build apk \
        --flavor production \
        --release \
        --split-per-abi \
        --target-platform=android-arm64 \
        --build-number=$$VERCODE$$ \
        --dart-define=EMAIL_PUBLIC_TOKEN=axichatpublictoken \
        --dart-define=ENABLE_SHOREBIRD=false
  - versionName: 0.6.1
    versionCode: 4001 # 4000 + pubspec build code (x86_64)
    commit: v0.6.1 # Replace with the exact release tag/commit submitted to F-Droid.
    subdir: .
    output: build/app/outputs/flutter-apk/app-x86_64-production-release.apk
    srclibs:
      - flutter@3.41.4
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - echo "flutter.sdk=$$flutter$$" > android/local.properties
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
      - $$flutter$$/bin/flutter build apk \
        --flavor production \
        --release \
        --split-per-abi \
        --target-platform=android-x64 \
        --build-number=$$VERCODE$$ \
        --dart-define=EMAIL_PUBLIC_TOKEN=axichatpublictoken \
        --dart-define=ENABLE_SHOREBIRD=false

AllowedAPKSigningKeys: 92d96304e82efa324f6aab21d731b32f05dbb3c8d42fc5514ea6755f33498d2e
VercodeOperation:
  - 1000 + %c
  - 2000 + %c
  - 4000 + %c

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: 'pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+'
CurrentVersion: 0.6.1
CurrentVersionCode: 4001

# When bumping versions, update versionName/commit fields and set versionCode
# per ABI using 1000/2000/4000 + the pubspec build code.
# Keep CurrentVersionCode equal to the highest ABI-specific version code.
# Keep VercodeOperation aligned with the ABI offsets above.
# keep --dart-define=EMAIL_PUBLIC_TOKEN=axichatpublictoken and
# --dart-define=ENABLE_SHOREBIRD=false so the F-Droid build ships with the
# public provisioning token and without OTA updates.
