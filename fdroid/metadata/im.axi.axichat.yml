# F-Droid metadata template for Axichat.
# Copy this file into fdroiddata/metadata/im.axi.axichat.yml when submitting to F-Droid.
# Keep fields in sync with pubspec.yaml before submission.

Categories:
  - Messaging
  - Internet

License: AGPL-3.0-or-later
AuthorName: Axichat Developers
WebSite: https://axi.chat
SourceCode: https://gitlab.com/axichat/axichat
IssueTracker: https://gitlab.com/axichat/axichat/-/issues
Changelog: https://gitlab.com/axichat/axichat/-/releases
Donate: https://axi.chat/support

RepoType: git
Repo: https://gitlab.com/axichat/axichat.git
Summary: Open-source XMPP + email messenger with calendar and no FCM.

Description: |
  **Warning:** Axichat is still under active development, so things may break.
  .
  Axichat is a cutting-edge email and XMPP client that is fully open source with
  1st party push notifications (no FCM ever) and no 3rd party dependencies.
  .
  Website: https://axi.chat
  License: AGPL-3.0-or-later
  .
  Highlights:
  - Unified chat + email inbox
  - Built-in collaborative calendar and tasks
  - Natural-language scheduling
  - Works without Google/Firebase/FCM
  - Offline-friendly sync and notifications
  .
  Android permissions are used only for messaging reliability and user-visible
  notifications (internet, notifications, foreground service, boot restore, and
  vibration).

Builds:
  - versionName: 0.6.0
    versionCode: 1 # Match pubspec.yaml version: 0.6.0+1
    commit: v0.6.0 # Replace with the exact release tag/commit submitted to F-Droid.
    subdir: .
    output: build/app/outputs/flutter-apk/app-production-release.apk
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - $$flutter$$/bin/flutter pub run build_runner build --delete-conflicting-outputs
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk \
        --flavor production \
        --release \
        --dart-define=ENABLE_SHOREBIRD=false

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 0.6.0
CurrentVersionCode: 1

# When bumping versions, update versionName/versionCode/commit fields above and
# keep --dart-define=ENABLE_SHOREBIRD=false so the F-Droid build ships without
# OTA updates.
